<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Analyzer | AI Powered</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- ✅ Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header class="app-header">
            <div class="logo-wrapper">
                <div class="logo-icon"></div>
                <h1>Risk<span class="highlight">IQ</span></h1>
            </div>
            <p>AI-Powered Financial Assessment</p>
        </header>

        <div class="content-wrapper">
            <section class="form-section glass-panel">
                <h2>Applicant Details</h2>
                <form id="riskForm" class="grid-form">
                    
                    <div class="input-group">
                        <label for="person_age">Age</label>
                        <input type="number" id="person_age" required min="18" max="100" placeholder="e.g. 28">
                    </div>

                    <div class="input-group">
                        <label for="person_income">Annual Income ($)</label>
                        <input type="number" id="person_income" required min="0" placeholder="e.g. 65000">
                    </div>

                    <div class="input-group">
                        <label for="person_emp_length">Employment Length (Years)</label>
                        <input type="number" id="person_emp_length" required min="0" step="0.1" placeholder="e.g. 5.5">
                    </div>

                    <div class="input-group">
                        <label for="person_home_ownership">Home Ownership</label>
                        <div class="select-wrapper">
                            <select id="person_home_ownership" required>
                                <option value="" disabled selected>Select status...</option>
                                <option value="RENT">Rent</option>
                                <option value="MORTGAGE">Mortgage</option>
                                <option value="OWN">Own</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group full-width section-divider">
                        <h3>Loan Information</h3>
                    </div>

                    <div class="input-group">
                        <label for="loan_amnt">Loan Amount ($)</label>
                        <input type="number" id="loan_amnt" required min="500" placeholder="e.g. 15000">
                    </div>

                    <div class="input-group">
                        <label for="loan_int_rate">Interest Rate (%)</label>
                        <input type="number" id="loan_int_rate" required step="0.01" min="0" max="100" placeholder="e.g. 10.5">
                    </div>

                    <div class="input-group">
                        <label for="loan_intent">Loan Intent</label>
                        <div class="select-wrapper">
                            <select id="loan_intent" required>
                                <option value="" disabled selected>Select an intent...</option>
                                <option value="PERSONAL">Personal</option>
                                <option value="EDUCATION">Education</option>
                                <option value="MEDICAL">Medical</option>
                                <option value="VENTURE">Venture</option>
                                <option value="HOMEIMPROVEMENT">Home Improvement</option>
                                <option value="DEBTCONSOLIDATION">Debt Consolidation</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="loan_grade">Loan Grade</label>
                        <div class="select-wrapper">
                            <select id="loan_grade" required>
                                <option value="" disabled selected>Select a grade...</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                                <option value="E">E</option>
                                <option value="F">F</option>
                                <option value="G">G</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group full-width section-divider">
                        <h3>Credit History</h3>
                    </div>

                    <div class="input-group">
                        <label for="cb_person_cred_hist_length">Credit History Length (Years)</label>
                        <input type="number" id="cb_person_cred_hist_length" required min="0" placeholder="e.g. 4">
                    </div>

                    <div class="input-group">
                        <label for="cb_person_default_on_file">Historical Default</label>
                        <div class="select-wrapper">
                            <select id="cb_person_default_on_file" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="Y">Yes</option>
                                <option value="N">No</option>
                            </select>
                        </div>
                    </div>

                    <div class="actions full-width">
                        <button type="submit" id="submitBtn" class="btn primary-btn">
                            <span class="btn-text">Analyze Risk Profile</span>
                            <div class="loader hidden"></div>
                        </button>
                    </div>
                </form>
            </section>

            <section class="results-section">
                <!-- (UNCHANGED RESULTS SECTION) -->
            </section>
        </div>

        <!-- ✅ ONLY ADDITION -->
        <section class="analytics-section glass-panel">
            <h2>Analytics Dashboard</h2>

            <div class="charts-container">
                <div class="chart-box">
                    <h3>Risk Distribution</h3>
                    <canvas id="riskChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Loan Intent Split</h3>
                    <canvas id="intentChart"></canvas>
                </div>
            </div>
        </section>

    </main>

    <!-- ✅ FIXED PATH -->
    <script src="script.js"></script>

    <!-- ✅ CHART SCRIPT -->
    <script>
        new Chart(document.getElementById('riskChart'), {
            type: 'pie',
            data: {
                labels: ['Low Risk', 'Medium Risk', 'High Risk'],
                datasets: [{
                    data: [40, 35, 25],
                    backgroundColor: ['#10b981', '#f59e0b', '#ef4444']
                }]
            }
        });

        new Chart(document.getElementById('intentChart'), {
            type: 'pie',
            data: {
                labels: ['Personal', 'Education', 'Medical', 'Venture'],
                datasets: [{
                    data: [30, 25, 20, 25],
                    backgroundColor: ['#6366f1', '#a855f7', '#10b981', '#f59e0b']
                }]
            }
        });
    </script>

</body>
</html>
